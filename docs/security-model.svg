<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="12">
  <defs>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#00fff2" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowMagenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ff00ff" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#39ff14" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#bf5fff" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ff6e40" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" rx="12" fill="url(#bgGrad2)" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" fill="#00fff2" font-size="16" font-weight="bold" filter="url(#glowCyan)">Security Model — Defense in Depth</text>

  <!-- Shield icon (decorative) -->
  <path d="M360,50 L360,58" stroke="#00fff2" stroke-width="1.5" opacity="0.5"/>

  <!-- Layer 1: MCP Host -->
  <rect x="40" y="65" width="640" height="95" rx="8" fill="none" stroke="#bf5fff" stroke-width="1.8" filter="url(#glowPurple)"/>
  <rect x="55" y="72" width="95" height="20" rx="4" fill="#bf5fff" opacity="0.15"/>
  <text x="102" y="86" text-anchor="middle" fill="#bf5fff" font-size="11" font-weight="bold">Layer 1</text>
  <text x="360" y="86" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">MCP Host (Claude Code / Cursor)</text>
  <text x="80" y="112" fill="#c9d1d9" font-size="11">&#x25B8; Human-in-the-loop tool approval</text>
  <text x="80" y="132" fill="#c9d1d9" font-size="11">&#x25B8; Session isolation</text>
  <text x="380" y="112" fill="#c9d1d9" font-size="11">&#x25B8; Credential injection via env vars</text>
  <text x="380" y="132" fill="#c9d1d9" font-size="11">&#x25B8; MCP protocol boundary</text>

  <!-- Layer 2: RedHands Server -->
  <rect x="40" y="175" width="640" height="115" rx="8" fill="none" stroke="#00fff2" stroke-width="1.8" filter="url(#glowCyan)"/>
  <rect x="55" y="182" width="95" height="20" rx="4" fill="#00fff2" opacity="0.15"/>
  <text x="102" y="196" text-anchor="middle" fill="#00fff2" font-size="11" font-weight="bold">Layer 2</text>
  <text x="360" y="196" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">RedHands Server</text>
  <text x="80" y="222" fill="#c9d1d9" font-size="11">&#x25B8; Binary allowlist (only known tools)</text>
  <text x="80" y="242" fill="#c9d1d9" font-size="11">&#x25B8; Shell metacharacter rejection</text>
  <text x="80" y="262" fill="#c9d1d9" font-size="11">&#x25B8; Target validation (IP/CIDR/host)</text>
  <text x="400" y="222" fill="#c9d1d9" font-size="11">&#x25B8; Output size cap (10MB)</text>
  <text x="400" y="242" fill="#c9d1d9" font-size="11">&#x25B8; Execution timeout (5min)</text>
  <text x="400" y="262" fill="#c9d1d9" font-size="11">&#x25B8; Rate limiting (token bucket)</text>

  <!-- Layer 3: OS / Container -->
  <rect x="40" y="305" width="640" height="95" rx="8" fill="none" stroke="#39ff14" stroke-width="1.8" filter="url(#glowGreen)"/>
  <rect x="55" y="312" width="95" height="20" rx="4" fill="#39ff14" opacity="0.15"/>
  <text x="102" y="326" text-anchor="middle" fill="#39ff14" font-size="11" font-weight="bold">Layer 3</text>
  <text x="360" y="326" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">OS / Container</text>
  <text x="80" y="352" fill="#c9d1d9" font-size="11">&#x25B8; Non-root execution</text>
  <text x="80" y="372" fill="#c9d1d9" font-size="11">&#x25B8; Pdeathsig (Linux process reaping)</text>
  <text x="400" y="352" fill="#c9d1d9" font-size="11">&#x25B8; Network policy (K8s, v0.2+)</text>
  <text x="400" y="372" fill="#c9d1d9" font-size="11">&#x25B8; Minimal container image</text>

  <!-- Layer 4: Audit Trail -->
  <rect x="40" y="415" width="640" height="95" rx="8" fill="none" stroke="#ff6e40" stroke-width="1.8" filter="url(#glowOrange)"/>
  <rect x="55" y="422" width="95" height="20" rx="4" fill="#ff6e40" opacity="0.15"/>
  <text x="102" y="436" text-anchor="middle" fill="#ff6e40" font-size="11" font-weight="bold">Layer 4</text>
  <text x="360" y="436" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Audit Trail</text>
  <text x="80" y="462" fill="#c9d1d9" font-size="11">&#x25B8; Every tool call logged</text>
  <text x="80" y="482" fill="#c9d1d9" font-size="11">&#x25B8; Params sanitized (secrets redacted)</text>
  <text x="400" y="462" fill="#c9d1d9" font-size="11">&#x25B8; OTLP export (v0.3+)</text>
  <text x="400" y="482" fill="#c9d1d9" font-size="11">&#x25B8; Immutable append-only log</text>

  <!-- Vertical flow indicator on right side -->
  <line x1="700" y1="80" x2="700" y2="495" stroke="#484f58" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="705" y="290" fill="#484f58" font-size="10" transform="rotate(90, 705, 290)">DEFENSE DEPTH</text>
</svg>