<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <defs>
    <linearGradient id="redGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
  </defs>

  <!-- Top hand (open palm, facing down) -->
  <g fill="url(#redGrad)">
    <!-- Fingers -->
    <rect x="36" y="10" width="8" height="34" rx="4"/>
    <rect x="47" y="6" width="8" height="38" rx="4"/>
    <rect x="58" y="8" width="8" height="36" rx="4"/>
    <rect x="69" y="14" width="8" height="30" rx="4"/>
    <!-- Thumb -->
    <rect x="25" y="28" width="8" height="22" rx="4" transform="rotate(-15 29 39)"/>
    <!-- Palm -->
    <ellipse cx="55" cy="56" rx="24" ry="18"/>
  </g>

  <!-- Bottom hand (open palm, facing up) -->
  <g fill="url(#redGrad)">
    <!-- Fingers -->
    <rect x="44" y="116" width="8" height="34" rx="4"/>
    <rect x="55" y="116" width="8" height="38" rx="4"/>
    <rect x="66" y="118" width="8" height="36" rx="4"/>
    <rect x="77" y="116" width="8" height="30" rx="4"/>
    <!-- Thumb -->
    <rect x="89" y="110" width="8" height="22" rx="4" transform="rotate(15 93 121)"/>
    <!-- Palm -->
    <ellipse cx="67" cy="104" rx="24" ry="18"/>
  </g>

  <!-- Center clash spark -->
  <circle cx="60" cy="80" r="3" fill="#ff4444" opacity="0.9"/>
  <line x1="54" y1="80" x2="48" y2="80" stroke="#ff4444" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="66" y1="80" x2="72" y2="80" stroke="#ff4444" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="74" x2="60" y2="70" stroke="#ff4444" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="86" x2="60" y2="90" stroke="#ff4444" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
